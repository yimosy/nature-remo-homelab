services:
  remo-homelab:
    build: .
    container_name: remo-homelab
    ports:
      - "8000:8000"
    environment:
      # 管理者ログイン用トークン。同じフォルダの .env に実際の値を書く(git管理外)
      ADMIN_TOKEN: "${ADMIN_TOKEN:?.env に ADMIN_TOKEN を設定してください}"
      # オプション: 接続元をネットワーク単位で制限する場合(カンマ区切り)
      ALLOW_CIDRS: "${ALLOW_CIDRS:-}"
      # リバースプロキシ経由の場合のみ有効化(X-Forwarded-For を信頼する)
      TRUST_PROXY: "${TRUST_PROXY:-}"
    volumes:
      - ./data:/data
    restart: unless-stopped
